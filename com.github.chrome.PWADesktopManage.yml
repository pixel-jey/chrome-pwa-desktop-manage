app-id: com.github.chrome.PWADesktopManage
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
# 这里保持不变，Flatpak 会自动去 /app/bin 找
command: start_app.sh

finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --allow=devel # 关键：允许执行动态生成的代码
  - --talk-name=org.freedesktop.Flatpak  # 允许调用宿主机命令
  - --share=ipc
  - --share=network
  - --filesystem=home # 必须有 home 权限才能读写快捷方式目录
  - --env=PYTHONPATH=/app/site-packages # 确保能找到 python 库

modules:
  - name: PWA-Desktop-Manage
    buildsystem: simple
    build-commands:
      # 1. 拷贝 Flet 编译出的所有内容到 /app 根目录
      - cp -r build/linux/* "${FLATPAK_DEST}/"
      
      # 2. 关键修复：将启动脚本安装到 bin 目录
      - install -Dm755 start_app.sh "${FLATPAK_DEST}/bin/start_app.sh"
      
      # 3. 拷贝你的二进制工具
      - cp pwa "${FLATPAK_DEST}/"
      
      # 4. 赋予权限
      - chmod +x "${FLATPAK_DEST}/chrome_pwa_desktop_manage"
      - chmod +x "${FLATPAK_DEST}/bin/start_app.sh"
      - chmod +x "${FLATPAK_DEST}/pwa"

      # 5. 安装图标
      - install -Dm644 com.github.chrome.PWADesktopManage.png "${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.github.chrome.PWADesktopManage.png"

      # 6. 直接在 YAML 中写入 Metainfo (解决版本号和 GUI 显示)
      - |
        mkdir -p ${FLATPAK_DEST}/share/metainfo
        cat <<EOF > ${FLATPAK_DEST}/share/metainfo/com.github.chrome.PWADesktopManage.metainfo.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <component type="desktop-application">
          <id>com.github.chrome.PWADesktopManage</id>
          <name>PWA Desktop Manage</name>
          <summary>Manage your PWA application</summary>
          <description>
            <p>This is a PWA desktop management tool developed by an individual.</p>
          </description>
          <launchable type="desktop-id">com.github.chrome.PWADesktopManage.desktop</launchable>
          <releases>
            <release version="1.0.0" date="2025-12-25" />
          </releases>
          <metadata_license>CC0-1.0</metadata_license>
          <project_license>MIT</project_license>
        </component>
        EOF

      # 7. 直接在 YAML 中写入 Desktop 文件 (解决 GUI 图标显示)
      - |
        mkdir -p ${FLATPAK_DEST}/share/applications
        cat <<EOF > ${FLATPAK_DEST}/share/applications/com.github.chrome.PWADesktopManage.desktop
        [Desktop Entry]
        Name=PWA Desktop Manage
        Comment=Manage Chrome PWAs
        Exec=start_app.sh
        Icon=com.github.chrome.PWADesktopManage
        Terminal=false
        Type=Application
        Categories=Utility;
        EOF

    sources:
      - type: dir
        path: .

